<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lighthouse Report Placeholder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      main {
        max-width: 640px;
        padding: 2rem;
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 12px;
        background: rgba(26, 26, 46, 0.85);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
      }
      code {
        background: rgba(0, 0, 0, 0.4);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        color: #00ff00;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lighthouse Report Pending</h1>
      <p>
        Run <code>npx lhci collect --config=./lighthouserc.json</code> and copy the generated
        <code>*.html</code> report to <code>reports/lighthouse-report.html</code> to replace this
        placeholder.
      </p>
      <p style="color: #b0b0b0">Use Lighthouse CI in your pipeline to automate report uploads.</p>
    </main>
  </body>
</html>
