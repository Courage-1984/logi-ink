<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bundle Treemap Placeholder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      main {
        max-width: 640px;
        padding: 2rem;
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 12px;
        background: rgba(26, 26, 46, 0.85);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      }
      code {
        background: rgba(0, 0, 0, 0.4);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        color: #00ffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>stats.html Pending</h1>
      <p>
        Run <code>npm run build</code> to regenerate <code>dist/stats.html</code>. The build will mirror the
        generated treemap to <code>reports/stats.html</code> so this tab displays the latest bundle stats.
      </p>
      <p style="color: #b0b0b0">
        Until then, this placeholder is shown so the reports hub remains navigable during development.
      </p>
    </main>
  </body>
</html>
